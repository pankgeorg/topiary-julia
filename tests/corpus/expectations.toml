# Snippets expected to still fail after formatting.
#
# - `juliasyntax` entries cover `tests/corpus/juliasyntax_parser.jl`.
#   `line` refers to the 1-based line number inside that file.
#   `status` is one of:
#     * grammar_gap   — tree-sitter-julia cannot parse the snippet
#     * format_error  — formatting introduces ERROR nodes
#     * ast_mismatch  — formatting preserves parse but changes AST structure
#
# - `roundtrip` entries cover `tests/corpus/<file>.txt` tree-sitter cases.
#   `file` is the basename without `.txt`; `name` is the corpus header.
#
# When the underlying issue is fixed, delete the entry — the matching
# `expect_*` assertion will flip to failing with "resolved" and point you
# back here.

